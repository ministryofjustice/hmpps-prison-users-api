version: '3.1'
services:

  prison-users-api-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: prison-users-api-db
    restart: always
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_USER=admin
      - POSTGRES_DB=prison-users-api-db

networks:
  hmpps:
