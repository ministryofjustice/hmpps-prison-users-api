hmpps-auth:
  url: "http://localhost:8090/auth"

spring:
  datasource:
    url: 'jdbc:h2:mem:authorization-api-db;MODE=PostgreSQL'
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/prison-users
